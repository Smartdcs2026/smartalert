<body
  data-page="login"
  class="login-page"
>
  <main class="login-layout">
    <section
      class="login-card"
      aria-labelledby="loginTitle"
    >
      <!-- ไอคอนระบบจริง -->
     <div class="login-app-icon" aria-hidden="true">
        <img
          src="./assets/icons/android-chrome-192x192.png?v=20260723"
          alt=""
          width="112"
          height="112"
          decoding="async"
        >
      </div>

      <header class="login-header">
        <p class="eyebrow">
          WAREHOUSE VEHICLE STATUS
        </p>

        <h1 id="loginTitle">
          ระบบติดตามสถานะรถและตู้สินค้า
        </h1>

        <p>
          กรุณาเข้าสู่ระบบเพื่อดูสถานะรถในพื้นที่คลัง
        </p>
      </header>

      <div class="date-time-panel">
        <span>
          วันที่และเวลาปัจจุบัน
        </span>

        <strong id="currentDateTime">
          --/--/---- --:--:--
        </strong>
      </div>

      <form
        id="loginForm"
        class="login-form"
        method="post"
        action="./login.html"
        autocomplete="on"
        novalidate
      >
        <label class="form-field">
          <span class="form-label">
            ชื่อผู้ใช้
          </span>

          <input
            id="username"
            name="username"
            type="text"
            inputmode="text"
            autocomplete="username"
            autocapitalize="none"
            spellcheck="false"
            autocorrect="off"
            enterkeyhint="next"
            maxlength="80"
            placeholder="กรอกชื่อผู้ใช้"
            required
          >
        </label>

        <label class="form-field">
          <span class="form-label">
            รหัสผ่าน
          </span>

          <span class="password-control">
            <input
              id="password"
              name="password"
              type="password"
              autocomplete="current-password"
              autocorrect="off"
              autocapitalize="none"
              spellcheck="false"
              enterkeyhint="go"
              maxlength="128"
              placeholder="กรอกรหัสผ่าน"
              required
            >

            <button
              id="togglePassword"
              class="password-toggle"
              type="button"
              aria-label="แสดงหรือซ่อนรหัสผ่าน"
              aria-pressed="false"
            >
              แสดง
            </button>
          </span>
        </label>

        <button
          id="loginButton"
          class="button button--primary button--login"
          type="submit"
        >
          เข้าสู่ระบบ
        </button>
      </form>

      <footer class="login-footer">
        <span class="security-dot"></span>
        เชื่อมต่อผ่านระบบยืนยันตัวตนที่ปลอดภัย
      </footer>
    </section>
  </main>

  <noscript>

      กรุณาเปิดใช้งาน JavaScript เพื่อใช้งานระบบ
    </div>
  </noscript>

  <script>
    /*
     * Round 05 Hotfix 28
     * Clock fallback สำหรับหน้า Login
     * ทำงานแยกจาก auth.js เพื่อให้วันที่เวลาไม่หาย แม้ไฟล์ auth cache/โหลดช้า
     */
    (function () {
      'use strict';

      function pad(value) {
        return String(value).padStart(2, '0');
      }

      function formatBangkokDateTime(date) {
        try {
          var formatter = new Intl.DateTimeFormat('en-GB', {
            timeZone: 'Asia/Bangkok',
            day: '2-digit',
            month: '2-digit',
            year: 'numeric',
            hour: '2-digit',
            minute: '2-digit',
            second: '2-digit',
            hourCycle: 'h23'
          });

          var parts = {};
          formatter.formatToParts(date).forEach(function (part) {
            parts[part.type] = part.value;
          });

          return parts.day + '/' + parts.month + '/' + parts.year + ' ' +
            parts.hour + ':' + parts.minute + ':' + parts.second;

        } catch (error) {
          var now = new Date();
          return pad(now.getDate()) + '/' + pad(now.getMonth() + 1) + '/' +
            now.getFullYear() + ' ' + pad(now.getHours()) + ':' +
            pad(now.getMinutes()) + ':' + pad(now.getSeconds());
        }
      }

      function updateLoginClock() {
        var el = document.getElementById('currentDateTime');
        if (!el) return;
        el.textContent = formatBangkokDateTime(new Date());
      }

      function cleanEmptyLoginQuery() {
        try {
          var url = new URL(window.location.href);
          if (
            url.pathname.toLowerCase().indexOf('/login.html') >= 0 &&
            (
              url.searchParams.has('username') ||
              url.searchParams.has('password')
            )
          ) {
            window.history.replaceState(null, document.title, url.origin + url.pathname);
          }
        } catch (error) {}
      }

      document.addEventListener('DOMContentLoaded', function () {
        cleanEmptyLoginQuery();
        updateLoginClock();
        window.setInterval(updateLoginClock, 1000);
      });
    })();
  </script>
